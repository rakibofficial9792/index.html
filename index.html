<script>

const SUPABASE_URL =
"https://ahorafoietmflijejvra.supabase.co";

const SUPABASE_KEY =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFob3JhZm9pZXRtZmxpamVqdnJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjQ2NjAsImV4cCI6MjA5NDI0MDY2MH0.zb5BlvgpbkkK6S7mc_oJvKhQfewyNEQaRqSsFOb-VDU";

const client =
window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let currentTab = 0;
let allPosts = [];

window.onload = function(){

  const logged =
  localStorage.getItem('logged_in');

  if(logged==="yes"){

    document.querySelector('.login-box')
    .style.display='none';

    document.getElementById('mainSystem')
    .style.display='block';

  }

};

async function login(){

  const username =
  document.getElementById('username').value.trim();

  const password =
  document.getElementById('password').value.trim();

  if(!username || !password){

    alert('Username & Password required');

    return;

  }

  const { data,error } =
  await client
  .from('owners')
  .select('*')
  .eq('username',username)
  .eq('password',password);

  if(error){

    console.log(error);

    alert('Database Error');

    return;

  }

  if(data && data.length>0){

    localStorage.setItem(
      'logged_in',
      'yes'
    );

    localStorage.setItem(
      'owner_username',
      username
    );

    alert('✅ Login Success');

    document.querySelector('.login-box')
    .style.display='none';

    document.getElementById('mainSystem')
    .style.display='block';

  }

  else{

    alert('❌ Invalid Login');

  }

}

function switchTab(tab){

  currentTab = tab;

  document.querySelectorAll('.tabs button')
  .forEach((btn,index)=>{

    btn.classList.toggle(
      'active',
      index===tab
    );

  });

}

function escapeHtml(text){

  return String(text)
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;');

}

async function fetchPosts(){

  const token =
  document.getElementById('token')
  .value.trim();

  const pageId =
  document.getElementById('pageId')
  .value.trim();

  const limit =
  document.getElementById('limit')
  .value;

  const resultDiv =
  document.getElementById('result');

  const totalDiv =
  document.getElementById('total');

  if(!token || !pageId){

    alert('Token & Page ID লাগবে');

    return;

  }

  localStorage.setItem(
    'fb_token',
    token
  );

  localStorage.setItem(
    'fb_page_id',
    pageId
  );

  resultDiv.innerHTML =
  '<div class="loading">⏳ Loading...</div>';

  try{

    let endpoint = 'feed';

    if(currentTab===1){

      endpoint='scheduled_posts';

    }

    const url =
`https://graph.facebook.com/v20.0/${pageId}/${endpoint}?fields=id,message,full_picture,permalink_url,created_time&limit=${limit}&access_token=${token}`;

    const response =
    await fetch(url);

    const data =
    await response.json();

    if(data.error){

      resultDiv.innerHTML =
      '❌ ' + data.error.message;

      return;

    }

    let posts =
    data.data || [];

    if(currentTab===2){

      const today =
      new Date();

      posts = posts.filter(post=>{

        if(!post.created_time)
        return false;

        const d =
        new Date(post.created_time);

        return (
          d.getDate()===today.getDate() &&
          d.getMonth()===today.getMonth() &&
          d.getFullYear()===today.getFullYear()
        );

      });

    }

    allPosts = [];

    let html = '';

    for(const post of posts){

      const caption =
      post.message
      ? escapeHtml(
          post.message.substring(0,120)
        )
      : 'No Caption';

      const image =
      post.full_picture || '';

      allPosts.push(post);

      html += `

      <div class="post">

      ${image ? `
      <img src="${image}">
      ` : ''}

      <div class="post-info">

      <div class="caption">
      ${caption}
      </div>

      <strong>${post.id}</strong>

      <br><br>

      <small>
      ${post.created_time || ''}
      </small>

      <br><br>

      <a
      class="open-link"
      href="${post.permalink_url || '#'}"
      target="_blank">

      Open Post

      </a>

      </div>

      <button
      class="copy-btn"
      onclick="copyPostId('${post.id}')">

      Copy

      </button>

      </div>

      `;

      await client
      .from('collected_posts')
      .insert([{

        worker_username:
        localStorage.getItem(
          'owner_username'
        ),

        post_id:post.id,

        caption:caption

      }]);

    }

    html += `

    <button
    class="download-btn"
    onclick="downloadCSV()">

    Download CSV

    </button>

    `;

    resultDiv.innerHTML = html;

    totalDiv.innerHTML =
    '✅ Total Posts: ' + posts.length;

    await client
    .from('facebook_tokens')
    .insert([{

      page_id:pageId,

      access_token:token,

      owner_username:
      localStorage.getItem(
        'owner_username'
      )

    }]);

  }

  catch(error){

    console.log(error);

    resultDiv.innerHTML =
    '❌ Request failed';

  }

}

function copyPostId(id){

  navigator.clipboard.writeText(id);

  alert('✅ Copied: ' + id);

}

function clearSavedData(){

  localStorage.removeItem(
    'fb_token'
  );

  localStorage.removeItem(
    'fb_page_id'
  );

  alert('✅ Cleared');

}

function downloadCSV(){

  if(allPosts.length===0)
  return;

  let csv =
  'Post ID,Message\n';

  allPosts.forEach(post=>{

    csv +=
`"${post.id}","${(post.message || '')
.replace(/"/g,'')}"\n`;

  });

  const blob =
  new Blob([csv],{
    type:'text/csv;charset=utf-8;'
  });

  const url =
  URL.createObjectURL(blob);

  const link =
  document.createElement('a');

  link.href = url;

  link.download =
  'posts.csv';

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

}

</script>
