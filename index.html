<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FB Post ID Collector</title>

<meta http-equiv="Content-Security-Policy"
content="default-src 'self'; connect-src https://graph.facebook.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src * data:;">

<style>

body{
  font-family:Arial,sans-serif;
  background:#0f0f0f;
  color:white;
  padding:20px;
  margin:0;
}

.container{
  max-width:900px;
  margin:auto;
  background:#181818;
  padding:20px;
  border-radius:16px;
}

h1{
  text-align:center;
  margin-bottom:25px;
}

label{
  display:block;
  margin-bottom:6px;
  font-weight:bold;
}

input,
select,
button{
  width:100%;
  padding:12px;
  margin-bottom:16px;
  border-radius:10px;
  border:none;
  box-sizing:border-box;
}

input,
select{
  background:#262626;
  color:white;
}

button{
  background:#1877f2;
  color:white;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

button:hover{
  background:#0d63d6;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}

.tabs button{
  background:#333;
}

.tabs button.active{
  background:#1877f2;
}

.notice{
  background:#1f2c1f;
  border:1px solid #2f7a2f;
  padding:12px;
  border-radius:10px;
  margin-bottom:20px;
  color:#9df59d;
  font-size:14px;
}

#tokenExpiryBox{
  background:#222;
  border:1px solid #444;
  padding:12px;
  border-radius:10px;
  margin-bottom:20px;
  font-size:14px;
  color:#ffd369;
  display:none;
}

.post{
  background:#242424;
  padding:14px;
  border-radius:14px;
  margin-bottom:14px;
  display:flex;
  gap:12px;
  align-items:flex-start;
}

.post img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:10px;
}

.post-info{
  flex:1;
  word-break:break-word;
}

.caption{
  font-size:15px;
  font-weight:bold;
  margin-bottom:8px;
  color:#76ff76;
}

.copy-btn{
  width:auto;
  padding:10px 14px;
  background:#28a745;
}

.copy-btn:hover{
  background:#1f8235;
}

.download-btn{
  background:#28a745;
  margin-top:20px;
}

.load-more-btn{
  background:#ff9800;
  margin-top:15px;
}

.clear-btn{
  background:#dc3545;
}

.total{
  font-size:18px;
  margin-bottom:18px;
  color:#76ff76;
}

.loading{
  text-align:center;
  padding:20px;
}

.open-link{
  color:#4da3ff;
  text-decoration:none;
  font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>FB Post ID Collector</h1>

<div class="notice">
🔒 Access Token only saved in your browser.
Nothing stored anywhere except Facebook Graph API.
</div>

<div id="tokenExpiryBox">
⏳ Token Expiry: Checking...
</div>

<label>Access Token</label>
<input type="password" id="token" placeholder="EAAxxxxxxxxxxxx">

<label>Page ID</label>
<input type="text" id="pageId" placeholder="1234567890">

<label>Limit</label>

<select id="limit">
<option value="10">10</option>
<option value="25">25</option>
<option value="50">50</option>
<option value="100" selected>100</option>
</select>

<div class="tabs">

<button id="tab0"
class="active"
onclick="switchTab(0)">
Published
</button>

<button id="tab1"
onclick="switchTab(1)">
Scheduled
</button>

<button id="tab2"
onclick="switchTab(2)">
Today
</button>

</div>

<button onclick="fetchPosts()">
Collect Post IDs
</button>

<button class="clear-btn" onclick="clearSavedData()">
Clear Saved Token
</button>

<div id="total" class="total"></div>
<div id="result"></div>

</div>

<script>

let currentTab = 0;
let allPosts = [];
let nextPageUrl = null;

window.onload = function(){

  const savedToken =
  localStorage.getItem('fb_token');

  const savedPageId =
  localStorage.getItem('fb_page_id');

  if(savedToken){

    document.getElementById('token').value =
    savedToken;

  }

  if(savedPageId){

    document.getElementById('pageId').value =
    savedPageId;

  }

};

function switchTab(tab){

  currentTab = tab;

  document.querySelectorAll('.tabs button')
  .forEach((btn,index)=>{

    btn.classList.toggle('active',index===tab);

  });

}

function escapeHtml(text){

  return String(text)
  .replace(/&/g,'&amp;')
  .replace(/</g,'&lt;')
  .replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;')
  .replace(/'/g,'&#039;');

}

async function checkTokenExpiry(token){

  const box =
  document.getElementById('tokenExpiryBox');

  try{

    const response =
    await fetch(
`https://graph.facebook.com/debug_token?input_token=${token}&access_token=${token}`
    );

    const data =
    await response.json();

    if(
      data.data &&
      data.data.expires_at
    ){

      box.style.display = 'block';

      const expiryDate =
      new Date(
        data.data.expires_at * 1000
      );

      const now =
      new Date();

      const diff =
      expiryDate - now;

      const days =
      Math.floor(
        diff / (1000 * 60 * 60 * 24)
      );

      if(days <= 0){

        box.innerHTML =
        '❌ Token Expired';

        box.style.color = '#ff6b6b';

      }

      else{

        box.innerHTML =
        `⏳ Token Expiry: ${expiryDate.toLocaleString()}<br>🗓️ Remaining: ${days} Days`;

      }

    }

    else{

      box.style.display = 'block';

      box.innerHTML =
      '⚠️ Expiry info unavailable';

    }

  }

  catch(error){

    console.log(error);

  }

}

async function fetchPosts(){

  const token =
  document.getElementById('token').value.trim();

  const pageId =
  document.getElementById('pageId').value.trim();

  const limit =
  document.getElementById('limit').value;

  const resultDiv =
  document.getElementById('result');

  const totalDiv =
  document.getElementById('total');

  allPosts = [];
  nextPageUrl = null;

  if(!token || !pageId){

    resultDiv.innerHTML =
    '❌ Token এবং Page ID দিতে হবে';

    return;

  }

  localStorage.setItem('fb_token',token);
  localStorage.setItem('fb_page_id',pageId);

  checkTokenExpiry(token);

  resultDiv.innerHTML =
  '<div class="loading">⏳ Loading...</div>';

  totalDiv.innerHTML = '';

  try{

    let endpoint = 'feed';

    if(currentTab===1){

      endpoint='scheduled_posts';

    }

    const url =
`https://graph.facebook.com/v20.0/${pageId}/${endpoint}?fields=id,message,full_picture,permalink_url,created_time,scheduled_publish_time&limit=${limit}&access_token=${token}`;

    const response = await fetch(url);

    const data = await response.json();

    nextPageUrl = data.paging?.next || null;

    if(data.error){

      resultDiv.innerHTML =
      `❌ ${escapeHtml(data.error.message)}`;

      return;

    }

    let posts = data.data || [];

    if(currentTab===2){

      const today = new Date();

      posts = posts.filter(post=>{

        if(!post.created_time) return false;

        const d = new Date(post.created_time);

        return d.getDate()===today.getDate() &&
        d.getMonth()===today.getMonth() &&
        d.getFullYear()===today.getFullYear();

      });

    }

    renderPosts(posts,false);

    totalDiv.innerHTML =
    `✅ Total ${posts.length} Posts`;

  }

  catch(error){

    resultDiv.innerHTML =
    '❌ Request failed';

  }

}

function renderPosts(posts,append=true){

  const resultDiv =
  document.getElementById('result');

  let html = '';

  posts.forEach(post=>{

    const postId =
    escapeHtml(post.id);

    let time = 'N/A';

    let type =
    currentTab===1
    ? 'Scheduled'
    : 'Published';

    if(post.created_time){

      time = new Date(
      post.created_time
      ).toLocaleString();

    }

    if(post.scheduled_publish_time){

      time = new Date(
      post.scheduled_publish_time * 1000
      ).toLocaleString();

    }

    const caption =
    post.message
    ? escapeHtml(
    post.message.substring(0,120)
    )
    : 'No Caption';

    const image =
    post.full_picture || '';

    allPosts.push({

      id:post.id,
      type,
      time,
      caption

    });

    html += `

    <div class="post">

    ${image ? `
    <img src="${image}">
    ` : ''}

    <div class="post-info">

    <div class="caption">
    ${caption}
    </div>

    <strong>${postId}</strong>

    <br><br>

    <small>
    ${escapeHtml(time)} • ${type}
    </small>

    <br><br>

    <a
    class="open-link"
    href="${post.permalink_url || '#'}"
    target="_blank">

    Open Post

    </a>

    </div>

    <button
    class="copy-btn"
    onclick="copyPostId('${post.id}')">

    Copy

    </button>

    </div>

    `;

  });

  html += `

  <button
  class="download-btn"
  onclick="downloadCSV()">

  Download CSV

  </button>

  `;

  if(nextPageUrl){

    html += `

    <button
    class="load-more-btn"
    onclick="loadMorePosts()">

    Load More Posts

    </button>

    `;

  }

  if(append){

    resultDiv.innerHTML += html;

  }else{

    resultDiv.innerHTML = html;

  }

}

async function loadMorePosts(){

  if(!nextPageUrl) return;

  const oldButton =
  document.querySelector('.load-more-btn');

  if(oldButton){

    oldButton.remove();

  }

  try{

    const response =
    await fetch(nextPageUrl);

    const data =
    await response.json();

    nextPageUrl =
    data.paging?.next || null;

    const posts =
    data.data || [];

    renderPosts(posts,true);

  }

  catch(error){

    alert('❌ Failed to load more posts');

  }

}

function copyPostId(id){

  navigator.clipboard.writeText(id)

  .then(()=>{

    alert('✅ Copied: ' + id);

  });

}

function downloadCSV(){

  if(allPosts.length===0) return;

  let csv =
  'Post ID,Type,Date & Time,Caption\n';

  allPosts.forEach(post=>{

    csv +=
`"${post.id}","${post.type}","${post.time}","${post.caption}"\n`;

  });

  const blob = new Blob([csv],{

    type:'text/csv;charset=utf-8;'

  });

  const url =
  URL.createObjectURL(blob);

  const link =
  document.createElement('a');

  link.href = url;

  link.download =
  'fb_post_ids.csv';

  document.body.appendChild(link);

  link.click();

  document.body.removeChild(link);

}

function clearSavedData(){

  localStorage.removeItem('fb_token');
  localStorage.removeItem('fb_page_id');

  alert('✅ Saved Token Cleared');

}

</script>
